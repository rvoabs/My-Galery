<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RVOABS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #000000;
    }

    header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px 20px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 20px 0;
      font-size: 36px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .qr-container {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }

    .qr-container img {
      width: 110px;
      height: 110px;
      display: block;
    }

    .custom-gallery-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px 20px;
    }
    
    .custom-gallery {
      column-count: 3;
      column-gap: 15px;
      display: block;
    }
    
    @media (max-width: 900px) { .custom-gallery { column-count: 2; } }
    @media (max-width: 600px) { .custom-gallery { column-count: 1; } }

    .gallery-item {
      background: #ffffff;
      margin-bottom: 15px;
      break-inside: avoid;
      display: flex;
      flex-direction: column;
      opacity: 0; /* Wird erst sichtbar, wenn sortiert */
      transition: opacity 0.3s ease;
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .gallery-item img:hover {
      opacity: 0.9;
    }

    .exif-info {
      font-size: 11px;
      color: #666666;
      margin-top: 6px;
      margin-bottom: 12px;
      line-height: 1.4;
      letter-spacing: 0.5px;
    }

    .lightbox-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      cursor: zoom-out;
    }

    .lightbox-overlay img {
      max-width: 90%;
      max-height: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <header>
    <h1>RVOABS</h1>
    <div class="qr-container">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rvoabs.de" alt="QR Code">
    </div>
  </header>

  <div class="custom-gallery-container">
    <div class="custom-gallery" id="gallery">
      
      <div class="gallery-item">
        <img src="foto1.jpg">
        <div class="exif-info">Lade Bilddaten...</div>
      </div>

      <div class="gallery-item">
        <img src="foto2.jpg">
        <div class="exif-info">Lade Bilddaten...</div>
      </div>
      </div>
  </div>

  <div class="lightbox-overlay" id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
  </div>

  <script>
    // Lightbox Code
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    document.querySelectorAll('.gallery-item img').forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.style.display = 'flex';
      });
    });

    // EXIF-Daten auslesen und sortieren
    window.addEventListener('load', () => {
      const gallery = document.getElementById('gallery');
      const items = Array.from(gallery.getElementsByClassName('gallery-item'));
      let processedCount = 0;

      items.forEach(item => {
        const img = item.querySelector('img');

        function processImage() {
          EXIF.getData(img, function() {
            const model = EXIF.getTag(this, "Model") || "";
            const fNumber = EXIF.getTag(this, "FNumber") ? "f/" + EXIF.getTag(this, "FNumber") : "";
            const iso = EXIF.getTag(this, "ISOSpeedRatings") ? "ISO " + EXIF.getTag(this, "ISOSpeedRatings") : "";
            const shutter = EXIF.getTag(this, "ExposureTime");
            const exifDate = EXIF.getTag(this, "DateTimeOriginal") || EXIF.getTag(this, "DateTime") || "";
            
            item.setAttribute('data-timestamp', exifDate);

            let shutterStr = "";
            if (shutter) {
              shutterStr = shutter >= 1 ? shutter + "s" : "1/" + Math.round(1/shutter) + "s";
            }

            let displayDate = "";
            if (exifDate) {
              const parts = exifDate.split(' ')[0].split(':');
              if (parts.length === 3) displayDate = `${parts[2]}.${parts[1]}.${parts[0]} | `;
            }

            const infoDiv = img.nextElementSibling;
            const specs = [model, fNumber, shutterStr, iso].filter(Boolean).join(' | ');
            infoDiv.innerText = displayDate + (specs || "Keine Kamera-Details");

            checkAndSort();
          });
        }

        function checkAndSort() {
          processedCount++;
          if (processedCount === items.length) {
            // Sortieren von neu nach alt
            items.sort((a, b) => {
              const dateA = a.getAttribute('data-timestamp') || '';
              const dateB = b.getAttribute('data-timestamp') || '';
              return dateB.localeCompare(dateA);
            });
            // Neu anordnen und sichtbar machen
            items.forEach(el => {
              gallery.appendChild(el);
              el.style.opacity = "1";
            });
          }
        }

        if (img.complete) {
          processImage();
        } else {
          img.addEventListener('load', processImage);
          img.addEventListener('error', checkAndSort); // Falls ein Bildpfad falsch ist
        }
      });
    });
  </script>

</body>
</html>
