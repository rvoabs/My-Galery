<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RVOABS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #000000;
    }

    header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 10px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 15px 0;
      font-size: 32px;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .qr-container {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .qr-container img {
      width: 100px;
      height: 100px;
      display: block;
    }

    .custom-gallery-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 10px 40px 10px;
    }
    
    .custom-gallery {
      column-count: 3;
      column-gap: 12px;
      display: block;
    }

    .gallery-item {
      background: #ffffff;
      margin-bottom: 12px;
      break-inside: avoid;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .gallery-item img:hover {
      opacity: 0.9;
    }

    .exif-info {
      font-size: 10px;
      color: #666666;
      margin-top: 5px;
      margin-bottom: 10px;
      line-height: 1.3;
      letter-spacing: 0.3px;
    }

    @media (max-width: 600px) {
      header { padding: 30px 15px 5px 15px; }
      header h1 { font-size: 26px; letter-spacing: 3px; }
      .qr-container { margin-bottom: 20px; }
      .qr-container img { width: 80px; height: 80px; }
      .custom-gallery { column-gap: 6px; }
      .gallery-item { margin-bottom: 6px; }
      .exif-info { font-size: 8px; margin-top: 3px; margin-bottom: 6px; }
    }

    .lightbox-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      cursor: zoom-out;
    }

    .lightbox-overlay img {
      max-width: 92%;
      max-height: 92%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <header>
    <h1>RVOABS</h1>
    <div class="qr-container">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rvoabs.de" alt="QR Code">
    </div>
  </header>

  <div class="custom-gallery-container">
    <div class="custom-gallery" id="gallery">
      </div>
  </div>

  <div class="lightbox-overlay" id="lightbox" onclick="this.style.display='none'">
    <img id="lightbox-img" src="">
  </div>

  <script>
    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    // Lightbox Event-Listener (wird später für dynamische Bilder genutzt)
    function initLightbox() {
      document.querySelectorAll('.gallery-item img').forEach(img => {
        img.removeAttribute('onclick'); // Altes entfernen falls vorhanden
        img.addEventListener('click', () => {
          lightboxImg.src = img.src;
          lightbox.style.display = 'flex';
        });
      });
    }

    // Holt sich automatisch alle Dateien aus deinem GitHub-Ordner
    async function loadGallery() {
      try {
        // Nutzt die öffentliche GitHub-API deines Projekts
        const response = await fetch('https://api.github.com/repos/rvoabs/My-Galery/contents/');
        const files = await response.json();
        
        // Filtert nur .jpg und .jpeg Dateien heraus
        const imageFiles = files.filter(file => 
          file.name.toLowerCase().endsWith('.jpg') || 
          file.name.toLowerCase().endsWith('.jpeg')
        );

        if(imageFiles.length === 0) return;

        let processedCount = 0;
        const itemsArray = [];

        imageFiles.forEach(file => {
          const item = document.createElement('div');
          item.className = 'gallery-item';
          
          const img = document.createElement('img');
          img.src = file.name;
          
          const infoDiv = document.createElement('div');
          infoDiv.className = 'exif-info';
          infoDiv.innerText = "Lade Bilddaten...";
          
          item.appendChild(img);
          item.appendChild(infoDiv);
          gallery.appendChild(item);
          itemsArray.push(item);

          function processImage() {
            EXIF.getData(img, function() {
              const model = EXIF.getTag(this, "Model") || "";
              const fNumber = EXIF.getTag(this, "FNumber") ? "f/" + EXIF.getTag(this, "FNumber") : "";
              const iso = EXIF.getTag(this, "ISOSpeedRatings") ? "ISO " + EXIF.getTag(this, "ISOSpeedRatings") : "";
              const shutter = EXIF.getTag(this, "ExposureTime");
              const exifDate = EXIF.getTag(this, "DateTimeOriginal") || EXIF.getTag(this, "DateTime") || "";
              
              item.setAttribute('data-timestamp', exifDate);

              let shutterStr = "";
              if (shutter) {
                shutterStr = shutter >= 1 ? shutter + "s" : "1/" + Math.round(1/shutter) + "s";
              }

              let displayDate = "";
              if (exifDate) {
                const parts = exifDate.split(' ')[0].split(':');
                if (parts.length === 3) displayDate = `${parts[2]}.${parts[1]}.${parts[0]} | `;
              }

              const specs = [model, fNumber, shutterStr, iso].filter(Boolean).join(' | ');
              infoDiv.innerText = displayDate + (specs || "Keine Kamera-Details");

              checkAndSort();
            });
          }

          function checkAndSort() {
            processedCount++;
            if (processedCount === imageFiles.length) {
              // Sortiert alle gefundenen Bilder nach EXIF-Datum (neu zu alt)
              itemsArray.sort((a, b) => {
                const dateA = a.getAttribute('data-timestamp') || '';
                const dateB = b.getAttribute('data-timestamp') || '';
                return dateB.localeCompare(dateA);
              });
              
              // Sortierte Bilder ins Raster hängen und einblenden
              itemsArray.forEach(el => {
                gallery.appendChild(el);
                el.style.opacity = "1";
              });
              initLightbox();
            }
          }

          if (img.complete) {
            processImage();
          } else {
            img.addEventListener('load', processImage);
            img.addEventListener('error', checkAndSort);
          }
        });

      } catch (error) {
        console.error("Fehler beim Laden der Bilderliste:", error);
      }
    }

    window.addEventListener('load', loadGallery);
  </script>

</body>
</html>
